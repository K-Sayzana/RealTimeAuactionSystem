<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C; --gold-dark: #8B6914; --cream: #FAF6EE;
    --ink: #1A1208; --wood: #2D1F0E; --wood-mid: #3D2B14;
    --red: #B5341A; --green: #2A7A3B; --muted: #6B5A3E;
    --card: #FDF9F2; --border: rgba(201,168,76,0.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Source Sans 3', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }

  header {
    background: var(--wood); border-bottom: 3px solid var(--gold);
    padding: 0 2rem; display: flex; align-items: center;
    justify-content: space-between; height: 70px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 1.7rem; font-weight: 900; color: var(--gold); }
  .logo span { color: #aaa; font-size: 0.78rem; display: block; font-family: 'Source Sans 3', sans-serif; letter-spacing: 0.12em; }
  nav { display: flex; gap: 0.4rem; align-items: center; }
  nav a {
    color: #ccc; text-decoration: none; padding: 6px 15px;
    border-radius: 6px; font-size: 0.88rem; transition: all 0.2s;
    border: 1px solid transparent;
  }
  nav a:hover { color: var(--gold); border-color: var(--border); }
  nav a.active { color: var(--gold); border-color: var(--gold-dark); background: rgba(201,168,76,0.1); }
  .nav-username {
    color: #999; font-size: 0.85rem;
    padding: 0 0.75rem; border-left: 1px solid #444; margin-left: 0.25rem;
  }
  .btn-logout {
    color: #999; background: none; border: 1px solid #444;
    padding: 5px 13px; border-radius: 6px; cursor: pointer;
    font-size: 0.85rem; transition: all 0.2s; font-family: 'Source Sans 3', sans-serif;
  }
  .btn-logout:hover { color: var(--red); border-color: var(--red); }
  #connDot {
    width: 9px; height: 9px; border-radius: 50%;
    background: #555; display: inline-block; transition: background 0.3s;
    margin-left: 4px;
  }
  #connDot.on  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  #connDot.off { background: var(--red); }

  .container { max-width: 1280px; margin: 0 auto; padding: 2rem 1.5rem; }
  .section-title {
    font-family: 'Playfair Display', serif; font-size: 1.4rem;
    color: var(--wood); border-bottom: 2px solid var(--gold);
    padding-bottom: 0.5rem; margin-bottom: 1.25rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .section-title::before { content: ''; width: 4px; height: 1.3em; background: var(--gold); border-radius: 2px; }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.4rem; transition: box-shadow 0.2s;
  }
  .card:hover { box-shadow: 0 6px 24px rgba(201,168,76,0.12); }
  input[type=text], input[type=password], input[type=number], textarea, select {
    width: 100%; padding: 10px 14px;
    border: 1px solid var(--border); border-radius: 7px;
    background: #fff; color: var(--ink); font-size: 0.95rem;
    outline: none; transition: border-color 0.2s;
    font-family: 'Source Sans 3', sans-serif;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--gold); }
  .btn {
    padding: 10px 22px; border-radius: 7px; border: none;
    font-weight: 600; cursor: pointer; font-size: 0.95rem;
    transition: all 0.2s; font-family: 'Source Sans 3', sans-serif;
  }
  .btn-primary { background: var(--wood); color: var(--gold); border: 1px solid var(--gold-dark); }
  .btn-primary:hover { background: var(--gold); color: var(--wood); }
  .btn-gold { background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: var(--wood); font-family: 'Playfair Display', serif; }
  .btn-gold:hover { opacity: 0.88; }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(181,52,26,0.4); }
  .btn-danger:hover { background: rgba(181,52,26,0.08); }
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .badge-open   { background: rgba(42,122,59,0.12);  color: var(--green);    border: 1px solid rgba(42,122,59,0.3); }
  .badge-closed { background: rgba(181,52,26,0.1);   color: var(--red);      border: 1px solid rgba(181,52,26,0.25); }
  .badge-seller { background: rgba(201,168,76,0.15); color: var(--gold-dark);border: 1px solid var(--border); }
  .tag { font-size: 0.78rem; color: var(--muted); }
  label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--muted); margin-bottom: 5px; letter-spacing: 0.04em; }
  .form-group { margin-bottom: 1rem; }
  .msg-error   { color: var(--red);   font-size: 0.88rem; margin-top: 0.5rem; }
  .msg-success { color: var(--green); font-size: 0.88rem; margin-top: 0.5rem; }
  @keyframes slideIn  { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
  @keyframes flashGreen { 0% { border-color: var(--green); box-shadow: 0 0 0 3px rgba(42,122,59,0.2); } 100% { border-color: var(--border); box-shadow: none; } }
</style>

<header>
  <div class="logo">GavelHouse <span>LIVE AUCTION</span></div>
  <nav>
    <a href="/auction" class="{{nav-auction}}">Auction Floor</a>
    {{nav-second-link}}
    <span class="nav-username">{{username}}</span>
    <span id="connDot"></span>
    <form method="post" action="/api/logout" style="display:inline" onsubmit="sessionStorage.removeItem('gavel_session_token');">
      <button class="btn-logout" type="submit">Sign Out</button>
    </form>
  </nav>
</header>
