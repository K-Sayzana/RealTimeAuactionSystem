<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GavelHouse — Auction Floor</title>
  {{navbar}}
  <style>
    .layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 1.5rem;
    }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

    #itemGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 1.2rem;
    }
    .item-card { position: relative; overflow: hidden; transition: all 0.2s; }
    .item-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold));
      opacity: 0; transition: opacity 0.3s;
    }
    .item-card:hover::before { opacity: 1; }
    .item-card:hover         { box-shadow: 0 8px 28px rgba(201,168,76,0.15); transform: translateY(-2px); border-color: var(--gold); }
    .item-card.flash         { animation: flashGreen 1s ease; }
    .item-name  { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--wood); margin: 0.5rem 0 0.25rem; line-height: 1.3; }
    .item-desc  { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.9rem; line-height: 1.5; }
    .bid-amount { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: var(--gold-dark); transition: color 0.4s; }
    .bid-amount.up { color: var(--green); }

    .countdown {
      font-size: 0.82rem; font-weight: 600; letter-spacing: 0.05em;
      padding: 3px 9px; border-radius: 12px; display: inline-block; margin-bottom: 0.7rem;
    }
    .countdown.ok     { background: rgba(42,122,59,0.1);   color: var(--green); }
    .countdown.warn   { background: rgba(201,168,76,0.15); color: var(--gold-dark); }
    .countdown.urgent { background: rgba(181,52,26,0.12);  color: var(--red); animation: pulse 1s infinite; }
    @keyframes pulse  { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .bid-row       { display: flex; gap: 0.5rem; margin-top: 0.8rem; }
    .bid-row input { flex: 1; }

    .sidebar { display: flex; flex-direction: column; gap: 1.2rem; }

    #feedBox { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; flex-shrink: 0; }
    .feed-header { background: var(--wood); padding: 0.8rem 1.1rem; font-family: 'Playfair Display', serif; color: var(--gold); display: flex; align-items: center; gap: 0.5rem; }
    .pulse-dot   { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); animation: pulse 1.4s infinite; }
    #feedList { list-style: none; height: 200px; overflow-y: auto; padding: 0.6rem; display: flex; flex-direction: column; gap: 0.4rem; }
    #feedList li { font-size: 0.83rem; padding: 7px 10px; border-radius: 6px; background: #fff; border-left: 3px solid var(--gold); animation: slideIn 0.3s ease; line-height: 1.4; }
    #feedList li.sys { border-left-color: #aaa; color: var(--muted); font-style: italic; }
    #feedList li.err { border-left-color: var(--red); }
    #feedList li .ft { font-size: 0.72rem; color: #bbb; margin-top: 2px; }

    #chatBox { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    #chatList { height: 220px; overflow-y: auto; padding: 0.6rem; display: flex; flex-direction: column; gap: 0.35rem; }
    .chat-msg             { font-size: 0.83rem; padding: 6px 9px; border-radius: 6px; background: #fff; line-height: 1.4; }
    .chat-msg .cn         { font-weight: 700; color: var(--wood); margin-right: 0.3rem; }
    .chat-msg .cn.seller  { color: var(--gold-dark); }
    .chat-input-row        { display: flex; gap: 0.5rem; padding: 0.6rem; }
    .chat-input-row input  { flex: 1; padding: 8px 12px; }
    .chat-input-row button { padding: 8px 14px; white-space: nowrap; }
  </style>
</head>
<body>

<div class="container">

  <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;padding:.8rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:8px;">
    <span style="font-size:.88rem;color:var(--muted)">Signed in as</span>
    <strong id="displayUsername">Loading Identity...</strong>
    <span id="displayRole" class="badge">Pending</span>
  </div>

  <div class="layout">

    <div>
      <div class="section-title">Live Auction Lots</div>
      <div id="itemGrid">
        <p style="color:var(--muted);font-style:italic">Connecting…</p>
      </div>
    </div>

    <div class="sidebar">

      <div id="feedBox">
        <div class="feed-header">
          <div class="pulse-dot"></div>
          Live Feed
        </div>
        <ul id="feedList">
          <li class="sys">Connecting…</li>
        </ul>
      </div>

      <div id="chatBox" style="display:none">
        <div class="feed-header" style="font-size:.95rem">💬 Bidder Chat</div>
        <div id="chatList"></div>
        <div class="chat-input-row">
          <input type="text" id="chatInput" placeholder="Say something…" maxlength="200">
          <button class="btn btn-primary" onclick="sendChat()">Send</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  let TAB_TOKEN = sessionStorage.getItem('gavel_session_token');

  if (!TAB_TOKEN || TAB_TOKEN === 'null') {
    const match = document.cookie.match(new RegExp('(^| )session=([^;]+)'));
    if (match) {
      TAB_TOKEN = match[2];
      sessionStorage.setItem('gavel_session_token', TAB_TOKEN);
    } else {
      TAB_TOKEN = '';
    }
  }

  let MY_NAME = "";
  let MY_ROLE = "";

  let ws;
  let items = {};

  function connect() {
    document.getElementById('feedList').innerHTML = '<li class="sys">Connecting…</li>';
    document.getElementById('chatList').innerHTML = '';

    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/auction-ws`);

    ws.onopen = () => {
      if (document.getElementById('connDot')) document.getElementById('connDot').className = 'on';

      console.log("[DEBUG] WebSocket connection opened successfully.");
      console.log("[DEBUG] Current TAB_TOKEN value being sent:", TAB_TOKEN);

      ws.send(JSON.stringify({ type: 'IDENTIFY', token: TAB_TOKEN }));
    };

    ws.onclose = (event) => {
      if (document.getElementById('connDot')) document.getElementById('connDot').className = 'off';

      console.warn(`[DEBUG] Socket CLOSED! Code: ${event.code}, Reason: ${event.reason}`);

      addFeed('Connection lost. Refresh to reconnect.', 'sys');
    };

    ws.onmessage = (e) => {
      console.log("[DEBUG] Raw JSON received from Java server:", e.data);

      try {
        const msg = JSON.parse(e.data);

        switch (msg.type) {
          case 'CONNECTED':
            if (document.getElementById('connDot')) document.getElementById('connDot').className = 'on';
            break;

          case 'INIT':
            MY_NAME = msg.username;
            MY_ROLE = msg.role;
            document.getElementById('displayUsername').textContent = MY_NAME;
            const roleBadge = document.getElementById('displayRole');
            roleBadge.textContent = MY_ROLE;
            roleBadge.className = 'badge ' + (MY_ROLE === 'SELLER' ? 'badge-seller' : 'badge-open');

            items = {};
            msg.items.forEach(i => items[i.id] = i);
            renderAll();
            if (MY_ROLE === 'BIDDER') {
              document.getElementById('chatBox').style.display = '';
              if (msg.chat) msg.chat.forEach(addChatMsg);
            } else {
              document.getElementById('chatBox').style.display = 'none';
            }
            document.getElementById('feedList').innerHTML = '';
            addFeed('Connected — live feed active.', 'sys');
            break;

          case 'BID_UPDATE':
            items[msg.item.id] = msg.item;
            updateCard(msg.item);
            if (MY_ROLE !== 'SELLER' || msg.seller === MY_NAME) {
              addFeed(msg.message);
            }
            break;

          case 'ITEM_CLOSED':
            if (msg.item) items[msg.item.id] = msg.item;
            else if (msg.itemId && items[msg.itemId]) items[msg.itemId].status = 'CLOSED';
            renderAll();
            if (MY_ROLE !== 'SELLER' || msg.seller === MY_NAME) {
              addFeed(msg.message || 'A lot has been closed.', 'sys');
            }
            break;

          case 'ITEM_ADDED':
            if (msg.item) {
              items[msg.item.id] = msg.item;
              const grid = document.getElementById('itemGrid');
              const empty = grid.querySelector('p');
              if (empty) empty.remove();
              grid.insertAdjacentHTML('beforeend', buildCard(msg.item));
              if (MY_ROLE !== 'SELLER') {
                addFeed('New lot listed: ' + msg.item.name, 'sys');
              }
            }
            break;

          case 'TICK':
            msg.items.forEach(i => {
              if (items[i.id]) items[i.id].seconds_left = i.seconds_left;
              updateCountdown(i.id, i.seconds_left, i.status);
            });
            break;

          case 'CHAT':
            addChatMsg(msg);
            break;

          case 'ERROR':
            addFeed('⚠ ' + msg.message, 'err');
            break;

          case 'EXPORT_DONE':
            addFeed('✓ Exported: ' + msg.filename, 'sys');
            break;
        }
      } catch (err) {
        console.error("[DEBUG] CRITICAL: JS crashed running switch on message payload!", err);
      }
    };
  }

  function renderAll() {
    const grid = document.getElementById('itemGrid');
    grid.innerHTML = '';
    const list = Object.values(items);
    if (!list.length) {
      grid.innerHTML = '<p style="color:var(--muted);font-style:italic">No auction lots available yet.</p>';
      return;
    }
    list.forEach(i => grid.insertAdjacentHTML('beforeend', buildCard(i)));
  }

  function buildCard(item) {
    const closed     = item.status === 'CLOSED';
    const min        = (item.current_bid + 0.01).toFixed(2);
    const cd         = fmtCountdown(item.seconds_left, item.status);
    const bidSection = (MY_ROLE === 'SELLER' || closed) ? '' : `
        <div class="bid-row">
          <input type="number" id="bi-${item.id}" placeholder="Min $${min}" min="${min}" step="0.01">
          <button class="btn btn-primary" onclick="placeBid(${item.id})">BID</button>
        </div>`;

    return `
        <div class="card item-card" id="card-${item.id}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <span class="badge ${closed ? 'badge-closed' : 'badge-open'}">${item.status}</span>
            <span id="cd-${item.id}" class="countdown ${cd.cls}">${cd.text}</span>
          </div>
          <div class="item-name">${item.name}</div>
          <div class="item-desc">${item.description}</div>
          <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:.5rem">
            <div>
              <div class="tag">Current Bid</div>
              <div class="bid-amount" id="ba-${item.id}">$${item.current_bid.toFixed(2)}</div>
            </div>
            <div style="text-align:right">
              <div class="tag">Started at</div>
              <div style="color:var(--muted);font-size:.9rem">$${item.start_price.toFixed(2)}</div>
            </div>
          </div>
          <div class="tag" style="margin-bottom:.3rem">Leader: <strong id="tb-${item.id}">${item.top_bidder}</strong></div>
          ${bidSection}
        </div>`;
  }

  function updateCard(item) {
    const card = document.getElementById('card-' + item.id);
    if (!card)                    { renderAll(); return; }
    if (item.status === 'CLOSED') { renderAll(); return; }

    const ba  = document.getElementById('ba-' + item.id);
    const tb  = document.getElementById('tb-' + item.id);
    const inp = document.getElementById('bi-' + item.id);

    if (ba) { ba.textContent = '$' + item.current_bid.toFixed(2); ba.classList.add('up'); setTimeout(() => ba.classList.remove('up'), 1500); }
    if (tb) tb.textContent = item.top_bidder;
    if (inp) { const m = (item.current_bid + 0.01).toFixed(2); inp.min = m; inp.placeholder = 'Min $' + m; }

    card.classList.add('flash');
    setTimeout(() => card.classList.remove('flash'), 1000);
  }

  function updateCountdown(id, sec, status) {
    const el = document.getElementById('cd-' + id);
    if (!el) return;
    const cd = fmtCountdown(sec, status);
    el.textContent = cd.text;
    el.className   = 'countdown ' + cd.cls;
  }

  function fmtCountdown(sec, status) {
    if (status === 'CLOSED') return { text: 'ENDED',    cls: 'urgent' };
    if (sec <= 0)            return { text: 'Closing…', cls: 'urgent' };

    const MINUTE = 60, HOUR = 3600, DAY = 86400, WEEK = 604800, MONTH = 2592000;
    let rem = Math.floor(sec);
    const mo = Math.floor(rem / MONTH);  rem %= MONTH;
    const w  = Math.floor(rem / WEEK);   rem %= WEEK;
    const d  = Math.floor(rem / DAY);    rem %= DAY;
    const h  = Math.floor(rem / HOUR);   rem %= HOUR;
    const m  = Math.floor(rem / MINUTE); rem %= MINUTE;
    const s  = rem;

    const parts = [];
    if (mo > 0) parts.push(mo + 'mo');
    if (w  > 0) parts.push(w  + 'w');
    if (d  > 0) parts.push(d  + 'd');
    if (h  > 0) parts.push(h  + 'h');
    if (m  > 0) parts.push(m  + 'm');
    if (s  > 0 || parts.length === 0) parts.push(s + 's');

    const text = parts.slice(0, 2).join(' ');
    const cls  = sec <= 30 ? 'urgent' : sec <= 120 ? 'warn' : 'ok';
    return { text, cls };
  }

  function placeBid(itemId) {
    const inp = document.getElementById('bi-' + itemId);
    const amt = parseFloat(inp.value);
    if (!amt || amt <= 0) { addFeed('Enter a valid bid amount.', 'err'); return; }
    ws.send(JSON.stringify({ type: 'BID', itemId, amount: amt }));
    inp.value = '';
  }

  function sendChat() {
    const inp = document.getElementById('chatInput');
    const msg = inp.value.trim();
    if (!msg) return;
    ws.send(JSON.stringify({ type: 'CHAT', message: msg }));
    inp.value = '';
  }

  function addFeed(text, cls = '') {
    const list = document.getElementById('feedList');
    list.querySelector('li.sys')?.remove();
    const li = document.createElement('li');
    if (cls) li.classList.add(cls);
    li.innerHTML = `${text}<div class="ft">${new Date().toLocaleTimeString()}</div>`;
    list.prepend(li);
    while (list.children.length > 40) list.removeChild(list.lastChild);
  }

  function addChatMsg(m) {
    const list = document.getElementById('chatList');
    const div  = document.createElement('div');
    div.className = 'chat-msg';
    const sellerCls = m.role === 'SELLER' ? 'seller' : '';
    const prefix    = m.role === 'SELLER' ? '⭐ ' : '';
    div.innerHTML   = `<span class="cn ${sellerCls}">${prefix}${m.username}</span>${m.message}`;
    list.appendChild(div);
    list.scrollTop = list.scrollHeight;
    while (list.children.length > 80) list.removeChild(list.firstChild);
  }

  document.getElementById('chatInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.id && e.target.id.startsWith('bi-')) {
      placeBid(parseInt(e.target.id.split('-')[1]));
    }
  });

  connect();
</script>
</body>
</html>
